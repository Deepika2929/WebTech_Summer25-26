<!DOCTYPE HTML>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <title>Signup</title>
    </head>
    <body>
        <h1>Internship Form</h1>
        <form>
            <label for="Studentname" id="name">Student Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
            <br><br>
            <label for="studentemail" id="studentemail" name="studentemail">Student Mail Address</label>
            <input type ="email" id = email name= email placeholder="Enter Your Email">
            <br><br>
            <label for="internship type" id="internship type" name="internship type">Internship Type:</label>
            <input type="radio" id=On-Site name=On-Site value="On-Site">On-Site
            <input type="radio" id=Remote name=Remote value="Remote">Remote 
            <br><br>
            <label for="Internship duration" id="Internship duration" name="internship duration">Internship Duration:</label>
            <select id="duration" name="duration">
                <option value="">Select Duration</option>
                <option value="6 weeks">6 Weeks</option>
                <option value="3 months">3 Months</option>
            </select>
            <br><br>
            <label>Skills of Interest</label>
            <br>
            <input type ="checkbox" id = "WebDevelopment" name = "skills" value = "Web Development">
            <label for = "Web Developer">Web Development</label>
            <br>
            <input type ="checkbox" id = "Dataanalysis" name = "skills" value = "Data Analysis">
            <label for = "Data Analysis">Data Analysis</label>
            <br>
            <input type ="checkbox" id = "MobileApps" name = "skills" value = "Mobile Apps">
            <label for = "Mobile Apps">Mobile Apps</label>
            <br>
            <button type="Checkbox" id= "submit" name= submit value="Submit">Submit

        </form>
    </body>
</html>
