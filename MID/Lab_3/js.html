<!DOCTYPE html>
<html>
    <head>
        <title>JS Basic</title>
    </head>
    <body>
        <script>
            console.log("Variable");
            var x=10;
            var y=20;
            console.log("The value of x:",x);
            console.log("The value of y:",y);

            var sum = x+y;
            console.log("Sum is",sum);
            var name="Tasnim";
            console.log("Name is: ",name);
            name_2="Ms. Deepika";
            console.log("Name without var: ",name_2);

            var hello;
            var hello_2=null;

            console.log(typeof x);
            console.log(typeof sum);
            console.log(typeof name);
            console.log(typeof hello);
            console.log(typeof hello_2);

            alert("Hello Wrold");
            document.write("Hello this is from JS ");
            var para=document.getElementById("demo");
            para.innerHTML("This is also from JS");
            
        </script>

        <h1 id="demo">This is the JS class</h1>
        <h2>Welcome</h2>
    </body>
</html>
